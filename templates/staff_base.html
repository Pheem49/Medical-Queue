<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>{{ title }}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>

<nav class="bg-white shadow-lg border-b-2 border-blue-100 sticky top-0 z-40 font-['Sarabun']">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center h-20">
      
      <div class="flex items-center gap-3">
        <button onclick="toggleMenu(true)" class="lg:hidden p-4 bg-gray-50 rounded-2xl hover:bg-blue-50 text-blue-600 transition-all shadow-sm">
          <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>

        <div class="flex items-center gap-3">
          <div class="bg-blue-600 p-2 rounded-xl shadow-md hidden xs:block">

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
            </svg>
          </div>
          <span class="font-black text-xl md:text-2xl text-gray-800 tracking-tight hidden sm:block">ระบบเจ้าหน้าที่</span>
        </div>
      </div>

      <div class="hidden lg:flex flex-1 justify-center items-center space-x-1">
        <a href="{{ url_for('slot.StaffCheckin') }}" class="flex items-center gap-2 text-blue-600 hover:bg-blue-50 px-5 py-2.5 rounded-xl text-base font-black transition-all whitespace-nowrap group">
          <svg class="w-5 h-5 text-blue-500 group-hover:text-blue-700 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3"></path>

          </svg>
          Scanner

        <a href="{{ url_for('booking_management.StaffPatients') }}" class="flex items-center gap-2 text-blue-600 hover:bg-blue-50 px-5 py-2.5 rounded-xl text-base font-black transition-all whitespace-nowrap group">
          <svg class="w-5 h-5 text-blue-500 group-hover:text-blue-700 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>

        </a>
        <a href="{{ url_for('booking_management.StaffHistory') }}" class="flex items-center gap-2 text-blue-600 hover:bg-blue-50 px-5 py-2.5 rounded-xl text-base font-black transition-all whitespace-nowrap group">
          <svg class="w-5 h-5 text-blue-500 group-hover:text-blue-700 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>

        </a>
        <a href="{{ url_for('doctor.StaffDoctors') }}" class="flex items-center gap-2 text-blue-600 hover:bg-blue-50 px-5 py-2.5 rounded-xl text-base font-black transition-all whitespace-nowrap group">
          <svg class="w-5 h-5 text-blue-500 group-hover:text-blue-700 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
          </svg>
          จัดการแพทย์
        </a>
      </div>

      <div class="flex items-center justify-end flex-shrink-0">
        <a href="{{ url_for('admin_auth.api_logout') }}" class="flex items-center gap-2 bg-red-50 px-4 py-3 lg:px-5 rounded-xl text-red-500 font-bold hover:bg-red-500 hover:text-white transition-all shadow-sm border border-red-100">
          <svg class="w-7 h-7 lg:w-5 lg:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          <span class="font-black hidden xs:block">ออกจากระบบ</span>
        </a>
      </div>
    </div>
  </div>
</nav>

<div id="side-menu" class="fixed inset-y-0 left-0 w-[80%] sm:w-80 bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 ease-in-out lg:hidden flex flex-col font-['Sarabun']">
  <!-- Header Logo & Close Menu -->
  <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-white">
    <div class="flex items-center gap-3">
      <div class="bg-blue-600 p-2 rounded-xl shadow-md">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
        </svg>
      </div>
      <span class="font-black text-xl text-gray-800 tracking-tight">ระบบเจ้าหน้าที่</span>
    </div>
    <button onclick="toggleMenu(false)" class="p-2 text-gray-500 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
  </div>
  
  <!-- Navigation Links -->
  <div class="flex-1 overflow-y-auto py-6 px-4 space-y-2 bg-gray-50/30">
    <div class="px-3 mb-2 text-xs font-bold text-gray-400 uppercase tracking-wider">เมนูหลัก</div>
    
    <!-- Scanner -->
    <a href="{{ url_for('slot.StaffCheckin') }}" class="flex items-center gap-4 p-4 text-gray-700 bg-white border border-gray-100 hover:border-blue-200 hover:bg-blue-50 rounded-2xl font-bold text-lg transition-all shadow-sm group">
      <div class="p-2.5 bg-blue-100 text-blue-600 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6a2 2 0 012-2h2M4 18a2 2 0 002 2h2M16 4h2a2 2 0 012 2v2M16 20h2a2 2 0 002-2v-2"></path>
        </svg>
      </div>
      Scanner
    </a>
    
    <!-- Today's Patients -->
    <a href="{{ url_for('booking_management.StaffPatients') }}" class="flex items-center gap-4 p-4 text-gray-700 bg-white border border-gray-100 hover:border-blue-200 hover:bg-blue-50 rounded-2xl font-bold text-lg transition-all shadow-sm group">
      <div class="p-2.5 bg-green-100 text-green-600 rounded-xl group-hover:bg-green-600 group-hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
        </svg>
      </div>
      รายชื่อผู้ป่วยวันนี้
    </a>

    <!-- History -->
    <a href="{{ url_for('booking_management.StaffHistory') }}" class="flex items-center gap-4 p-4 text-gray-700 bg-white border border-gray-100 hover:border-blue-200 hover:bg-blue-50 rounded-2xl font-bold text-lg transition-all shadow-sm group">
      <div class="p-2.5 bg-purple-100 text-purple-600 rounded-xl group-hover:bg-purple-600 group-hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      ประวัติการจอง
    </a>

    <!-- Manage Doctors -->
    <a href="{{ url_for('doctor.StaffDoctors') }}" class="flex items-center gap-4 p-4 text-gray-700 bg-white border border-gray-100 hover:border-blue-200 hover:bg-blue-50 rounded-2xl font-bold text-lg transition-all shadow-sm group">
      <div class="p-2.5 bg-orange-100 text-orange-600 rounded-xl group-hover:bg-orange-600 group-hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
        </svg>
      </div>
      จัดการแพทย์
    </a>
  </div>
</div>

<div id="overlay" onclick="toggleMenu(false)" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden transition-all"></div>

<script>
  function toggleMenu(isOpen) {
    const menu = document.getElementById('side-menu');
    const overlay = document.getElementById('overlay');
    if (isOpen) {
      menu.style.transform = 'translateX(0)';
      overlay.classList.remove('hidden');
    } else {
      menu.style.transform = 'translateX(-100%)';
      overlay.classList.add('hidden');
    }
  }
</script>

    {% block content %}

    <!-- Content block -->

    {% endblock %}
  </body>
</html>
