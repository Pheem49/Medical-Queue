{% extends "base.html" %}

<!-- หน้าประวัติการจองคิว -->
{% block content %}

<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 py-8 w-full">
  <div class="flex flex-col sm:flex-row items-center justify-between mb-8 gap-4">
    <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
      <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      ประวัติ
    </h1>
    <div class="flex gap-2">
      <span class="text-sm text-gray-500 self-center hidden sm:block">ตัวกรอง:</span>
      <select
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700">
        <option>ทั้งหมด</option>
      </select>
    </div>
  </div>

  <div id="historyContainer" class="space-y-4">
    <!-- History items will be populated here -->
    <p class="text-gray-500 text-center py-8">กำลังโหลดข้อมูล...</p>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const historyContainer = document.getElementById('historyContainer');
      try {
        // ดึงข้อมูลทั้งหมดจาก API เดิมที่เราใช้ได้เลย
        const response = await fetch('/api/history');
        if (response.ok) {
          const result = await response.json();

          if (result.status === 'success' && result.data && result.data.length > 0) {
            historyContainer.innerHTML = ''; // เคลียร์ข้อความกำลังโหลด

            // คัดกรองเอาเฉพาะสถานะ 'เสร็จสิ้น', 'ยกเลิก', 'cancelled', 'completed'
            const pastBookings = result.data.filter(booking => {
              const status = booking.status.toLowerCase();
              return status === 'เสร็จสิ้น' || status === 'ยกเลิก';
            });

            if (pastBookings.length === 0) {
              historyContainer.innerHTML = `
              <div class="text-center py-12 bg-white rounded-2xl shadow-sm border border-gray-100">
                <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-1">ไม่มีประวัติการเข้ารับบริการ</h3>
                <p class="text-gray-500 text-sm">คุณยังไม่มีประวัติการจองคิวที่เสร็จสิ้นหรือถูกยกเลิก</p>
              </div>
            `;
              return;
            }

            pastBookings.forEach(booking => {
              const rawDate = new Date(booking.slot_date);
              const formattedDate = rawDate.toLocaleDateString("th-TH", {
                year: "numeric",
                month: "long",
                day: "numeric",
              });

              // กำหนดสีและข้อความของสถานะ
              let statusColor = "bg-gray-100 text-gray-800";
              let statusText = booking.status;

              if (statusText === 'เสร็จสิ้น') {
                statusColor = "bg-green-100 text-green-800";
                statusText = "เสร็จสิ้น";
              } else if (statusText === 'ยกเลิก') {
                statusColor = "bg-red-100 text-red-800";
                statusText = "ยกเลิกแล้ว";
              }

              const historyCard = document.createElement('div');
              historyCard.className = "bg-white p-5 rounded-xl border border-gray-200 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4";
              historyCard.innerHTML = `
              <div class="flex items-start gap-4 w-full sm:w-auto">
                <div class="w-12 h-12 rounded-lg bg-gray-50 flex items-center justify-center flex-shrink-0 text-gray-500 border border-gray-100">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                  </svg>
                </div>
                <div>
                  <div class="flex items-center gap-2 mb-1">
                    <h3 class="font-bold text-gray-900 text-lg">${booking.department_name}</h3>
                    <span class="px-2 py-0.5 rounded text-xs font-medium ${statusColor}">
                      ${statusText}
                    </span>
                  </div>
                  <p class="text-sm text-gray-500 mb-1">แพทย์: <span class="text-gray-700">${booking.doctor_name}</span></p>
                  <p class="text-sm text-gray-500 flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    ${formattedDate} 
                    <span class="mx-1">•</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    ${booking.start_time.substring(0, 5)} - ${booking.end_time.substring(0, 5)} น.
                  </p>
                </div>
              </div>
              <div class="text-right w-full sm:w-auto">
                <span class="text-xs text-gray-400 block mb-1">หมายเลขคิว</span>
                <span class="font-mono text-gray-800 font-bold">#${booking.booking_id}</span>
              </div>
            `;
              historyContainer.appendChild(historyCard);
            });

          } else {
            historyContainer.innerHTML = '<p class="text-gray-500 text-center py-8">ไม่มีประวัติการจอง</p>';
          }
        } else {
          historyContainer.innerHTML = '<p class="text-red-500 text-center py-4">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
        }
      } catch (error) {
        console.error('Error fetching history:', error);
        historyContainer.innerHTML = '<p class="text-red-500 text-center py-4">ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์</p>';
      }
    });
  </script>

  {% endblock %}
</main>
