{% extends "base.html" %}

<!-- หน้าจองคิว -->
{% block content %}
<!-- Flatpickr CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
  /* สไตล์สำหรับวันที่ที่มีคิวว่าง (จางลงตามความต้องการ) */
  .available-date {
    background-color: #dbeafe !important; /* blue-100 */
    color: #1e40af !important; /* blue-800 */
    border-radius: 8px !important;
    font-weight: bold !important;
  }
  .available-date:hover {
    background-color: #bfdbfe !important; /* blue-200 */
  }
  /* ซ่อนปฏิทินของ browser เดิม */
  input[type="date"]::-webkit-inner-spin-button,
  input[type="date"]::-webkit-calendar-picker-indicator {
    display: none;
    -webkit-appearance: none;
  }
</style>

<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 py-8 w-full">
  <div class="mb-8">
    <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-6">
      จองคิวตรวจรักษา
    </h1>

    <div class="flex items-center justify-between relative max-w-xl mx-auto mb-10">
      <div class="absolute left-0 top-1/2 transform -translate-y-1/2 w-full h-1 bg-gray-200 -z-10"></div>

      <div class="flex flex-col items-center bg-white px-2">
        <div
          class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold mb-2 shadow-md">
          1
        </div>
        <span class="text-xs md:text-sm font-medium text-blue-800">ระบุข้อมูลการจอง</span>
      </div>
      <div class="flex flex-col items-center bg-white px-2">
        <div
          class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white border-2 border-gray-300 text-gray-400 flex items-center justify-center font-bold mb-2">
          2
        </div>
        <span class="text-xs md:text-sm font-medium text-gray-500">ยืนยันข้อมูล</span>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <!-- Left Column: Doctor & Dept -->
    <div class="space-y-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <label class="block text-gray-700 font-bold mb-3 flex items-center gap-2">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
            </path>
          </svg>
          เลือกแผนกที่ต้องการรักษา
        </label>
        <select id="departmentSelect"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white">
          <option value="" disabled selected>กำลังโหลดแผนก...</option>
        </select>
      </div>

      <script>
        document.addEventListener('DOMContentLoaded', async () => {
          const departmentSelect = document.getElementById('departmentSelect');
          try {
            const response = await fetch('/api/departments');
            if (response.ok) {
              const result = await response.json();
              if (result.success && result.departments) {
                departmentSelect.innerHTML = '<option value="" disabled selected>กรุณาเลือกแผนก</option>';
                result.departments.forEach(dept => {
                  const option = document.createElement('option');
                  option.value = dept.department_id;
                  option.textContent = dept.name;
                  option.dataset.id = dept.department_id;
                  departmentSelect.appendChild(option);
                });
              } else {
                departmentSelect.innerHTML = '<option value="" disabled selected>เกิดข้อผิดพลาดในการโหลดข้อมูล</option>';
              }
            } else {
              departmentSelect.innerHTML = '<option value="" disabled selected>เกิดข้อผิดพลาดในการโหลดข้อมูล</option>';
            }
          } catch (error) {
            console.error('Error fetching departments:', error);
            departmentSelect.innerHTML = '<option value="" disabled selected>ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์</option>';
          }

          // ----- Fetch doctors when department changes -----
          departmentSelect.addEventListener('change', async (e) => {
            const departmentId = e.target.value;
            const doctorContainer = document.getElementById('doctorContainer');

            if (!departmentId) return;

            doctorContainer.innerHTML = '<p class="text-gray-500 col-span-full text-center py-4">กำลังโหลดรายชื่อแพทย์...</p>';

            try {
              const response = await fetch(`/api/department/${departmentId}/doctors`);
              if (response.ok) {
                const result = await response.json();
                doctorContainer.innerHTML = '';

                if (result.success && result.doctors && result.doctors.length > 0) {
                  result.doctors.forEach(doctor => {
                    const doctorCard = document.createElement('div');
                    doctorCard.className = 'border border-gray-200 rounded-lg p-4 cursor-pointer hover:border-blue-500 hover:shadow-md transition-all';
                    doctorCard.dataset.id = doctor.id || doctor.doctor_id;

                    // Handle selection
                    doctorCard.addEventListener('click', () => {
                      document.querySelectorAll('#doctorContainer > div').forEach(el => {
                        el.classList.remove('border-blue-500', 'bg-blue-50', 'ring-2', 'ring-blue-200');
                      });
                      doctorCard.classList.add('border-blue-500', 'bg-blue-50', 'ring-2', 'ring-blue-200');

                      // We can add logic to show dates here or in a separate observer
                      document.getElementById('dateTimeSection').classList.remove('opacity-50', 'pointer-events-none');

                      // Save selected doctor
                      window.selectedDoctorId = doctor.id || doctor.doctor_id;

                      // Clear timegrid and disabled next button
                      document.getElementById('timeGrid').innerHTML = '<p class="col-span-full text-gray-400 text-center py-4 text-sm">กรุณาเลือกวันที่นัดหมายก่อน</p>';
                      document.getElementById('nextBtn').disabled = true;

                      // if a date is already selected, trigger fetching slots immediately
                      if (document.getElementById('date').value) {
                        document.getElementById('date').dispatchEvent(new Event('change'));
                      }

                      // Fetch and highlight available dates in calendar
                      updateAvailableDates(window.selectedDoctorId);
                    });

                    const specialistText = doctor.specialist || 'แพทย์ผู้เชี่ยวชาญ';
                    doctorCard.innerHTML = `
                        <div class="flex items-center gap-3">
                          <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-gray-500">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                          </div>
                          <div>
                            <h4 class="font-bold text-gray-900">${doctor.firstname} ${doctor.lastname}</h4>
                            <p class="text-sm text-gray-500 text-xs mt-1">${specialistText}</p>
                          </div>
                        </div>
                      `;
                    doctorContainer.appendChild(doctorCard);
                  });
                } else {
                  doctorContainer.innerHTML = '<p class="text-gray-500 col-span-full text-center py-4">ไม่พบแพทย์ในแผนกนี้</p>';
                }
              } else {
                doctorContainer.innerHTML = '<p class="text-red-500 col-span-full text-center py-4">เกิดข้อผิดพลาดในการโหลดข้อมูลแพทย์</p>';
              }
            } catch (error) {
              console.error('Error fetching doctors:', error);
              doctorContainer.innerHTML = '<p class="text-red-500 col-span-full text-center py-4">ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์</p>';
            }
          });

          // ----- Initialize Flatpickr -----
          const dateInput = document.getElementById('date');
          const fp = flatpickr(dateInput, {
            dateFormat: "Y-m-d",
            minDate: "today",
            locale: {
              firstDayOfWeek: 1
            },
            onChange: function(selectedDates, dateStr) {
               // Trigger the same logic as the old 'change' event
               dateInput.dispatchEvent(new Event('change'));
            }
          });

          // ----- Fetch available dates and highlight them when doctor is selected -----
          function getLocalDateString(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
          }

          async function updateAvailableDates(doctorId) {
            try {
              const response = await fetch(`/api/doctor/${doctorId}/available-dates`);
              if (response.ok) {
                const result = await response.json();
                if (result.status === 'success') {
                  const availableDates = result.dates; // Format: ["2026-03-07", ...]
                  console.log("Available dates for doctor:", availableDates);
                  
                  // Update Flatpickr highlighting
                  fp.set('onDayCreate', (dObj, dStr, fp, dayElem) => {
                    const dateStr = getLocalDateString(dayElem.dateObj);
                    if (availableDates.includes(dateStr)) {
                      dayElem.classList.add('available-date');
                      dayElem.title = "มีคิวว่าง";
                    } else {
                      dayElem.classList.remove('available-date');
                    }
                  });
                  
                  // Redraw to apply changes
                  fp.redraw();
                }
              }
            } catch (err) {
              console.error('Error fetching available dates:', err);
            }
          }

          // Override doctor card click to fetch dates
          const originalDoctorChange = () => {}; // Not needed if we update the listener below

          // ----- Fetch slots when date changes -----
          document.getElementById('date').addEventListener('change', async (e) => {
            const selectedDate = e.target.value;
            const timeGrid = document.getElementById('timeGrid');

            if (!selectedDate || !window.selectedDoctorId) {
              return;
            }

            timeGrid.innerHTML = '<p class="col-span-full text-gray-500 text-center py-4">กำลังโหลดช่วงเวลา...</p>';
            document.getElementById('nextBtn').disabled = true;

            try {
              const response = await fetch(`/api/admin/slots?doctor_id=${window.selectedDoctorId}&date=${selectedDate}`);
              if (response.ok) {
                const slots = await response.json();
                timeGrid.innerHTML = '';

                if (slots && slots.length > 0) {
                  slots.forEach(slot => {
                    const isFull = slot.current_bookings >= slot.max_capacity;
                    const isActive = slot.status === 'active';

                    const disabled = isFull || !isActive;

                    const slotBtn = document.createElement('label');
                    let classList = 'flex flex-col items-center justify-center p-3 border rounded-lg text-sm text-center transition-all cursor-pointer relative ';
                    if (disabled) {
                      classList += 'opacity-50 cursor-not-allowed bg-gray-100 border-gray-200 text-gray-400';
                    } else {
                      classList += 'border-gray-300 hover:border-blue-500 hover:bg-blue-50 text-gray-700 font-medium';
                    }

                    slotBtn.className = classList;

                    let insideHTML = `
                        <input type="radio" name="slot" value="${slot.id}" class="peer sr-only" ${disabled ? 'disabled' : ''}>
                        <span class="font-bold">${slot.start_time} - ${slot.end_time}</span>
                        <span class="text-xs mt-1 ${isFull ? 'text-red-500 font-bold' : 'text-green-600'}">
                            ${isFull ? 'เต็มแล้ว' : `ว่าง ${slot.max_capacity - slot.current_bookings} คิว`}
                        </span>
                        <div class="absolute inset-0 rounded-lg peer-checked:border-2 peer-checked:border-blue-600 peer-checked:bg-blue-50/50 pointer-events-none transition-all"></div>
                    `;

                    slotBtn.innerHTML = insideHTML;

                    if (!disabled) {
                      slotBtn.querySelector('input').addEventListener('change', () => {
                        if (slotBtn.querySelector('input').checked) {
                          document.getElementById('nextBtn').disabled = false;
                        }
                      });
                    }

                    timeGrid.appendChild(slotBtn);
                  });
                } else {
                  timeGrid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-4">ไม่พบช่วงเวลาว่างในวันที่เลือก</p>';
                }
              } else {
                timeGrid.innerHTML = '<p class="text-red-500 col-span-full text-center py-4">เกิดข้อผิดพลาดในการโหลดช่วงเวลา</p>';
              }
            } catch (error) {
              console.error('Error fetching slots:', error);
              timeGrid.innerHTML = '<p class="text-red-500 col-span-full text-center py-4">ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์</p>';
            }
          });

          // ----- Handle Booking Submission -----
          document.getElementById('nextBtn').addEventListener('click', async () => {
            const selectedSlot = document.querySelector('input[name="slot"]:checked');
            if (!selectedSlot) {
              alert('กรุณาเลือกช่วงเวลา');
              return;
            }

            const slotId = selectedSlot.value;
            const detail = document.getElementById('symptoms').value;

            // แทนที่จะบันทึกลงฐานข้อมูลเลย ให้ย้ายไปหน้ายืนยันข้อมูลพร้อมส่งพารามิเตอร์ไป
            window.location.href = `/booking/confirm?slot_id=${slotId}&detail=${encodeURIComponent(detail)}`;
          });

        });
      </script>

      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <h3 class="text-gray-700 font-bold mb-4 flex items-center gap-2">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
          เลือกแพทย์
        </h3>

        <div id="doctorContainer"
          class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[400px] overflow-y-auto no-scrollbar">
          <p class="text-gray-500 col-span-full text-center py-4">กรุณาเลือกแผนกเพื่อดูรายชื่อแพทย์</p>
        </div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <label class="block text-gray-700 font-bold mb-3">อาการเบื้องต้น / สาเหตุที่มาตรวจ</label>
        <textarea id="symptoms" rows="3"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="เช่น มีไข้สูง ปวดหัว ตัวร้อน เป็นมา 2 วัน..."></textarea>
      </div>
    </div>

    <!-- Right Column: Date & Time -->
    <div class="space-y-6">
      <div id="dateTimeSection" class="opacity-50 pointer-events-none transition-opacity duration-300">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6 transition-all duration-300">
          <label class="block text-gray-700 font-bold mb-3 flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v12a2 2 0 002 2z" />
            </svg>
            วันที่นัดหมาย
          </label>
          <input id="date" type="text" readonly placeholder="เลือกวันที่ต้องการนัดหมาย"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-700 bg-white cursor-pointer" />
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6 transition-all duration-300">
          <label class="block text-gray-700 font-bold mb-3 flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            เลือกช่วงเวลา
          </label>
          <div id="timeGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3">
            <p class="col-span-full text-gray-400 text-center py-4 text-sm">กรุณาเลือกวันที่นัดหมายก่อน</p>
          </div>
        </div>
      </div>

      <button id="nextBtn" disabled
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed">
        สรุปข้อมูลการจอง
      </button>
    </div>


  </div>
  </div>
</main>

<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

{% endblock %}
